<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tickets | TicketTally</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <link rel="stylesheet" href="css/my-tickets.css">
</head>
<body>

<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🎟️ TicketTally</div>
        <nav class="side-nav" id="sidebarMenu">
            <!-- Loaded dynamically by sidebar.js -->
        </nav>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="tickets-page animate-fade-in">
            <section class="tickets-header">
                <p class="eyebrow">Ticket Holder</p>
                <h1>My Tickets</h1>
                <p>View all tickets purchased by you.</p>
            </section>

            <section id="ticketsContainer" class="tickets-grid animate-fade-up">
                <!-- Dynamic cards -->
            </section>
        </div>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/auth.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/my-tickets.js"></script>

</body>
</html>
