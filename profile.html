<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile | TicketTally</title>
    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/sidebar.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 0 auto;
        }
        .profile-grid {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 30px;
            margin-top: 20px;
        }
        .profile-avatar-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: 40px 20px;
        }
        .profile-avatar-card .large-avatar {
            width: 100px;
            height: 100px;
            background: var(--primary-gradient);
            border-radius: 50%;
            display: grid;
            place-items: center;
            font-size: 38px;
            font-weight: 800;
            color: white;
            box-shadow: 0 0 30px var(--primary-glow);
            margin-bottom: 20px;
        }
        .profile-avatar-card h2 {
            font-size: 22px;
            margin-bottom: 6px;
        }
        .profile-avatar-card p {
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 20px;
        }
        .profile-info-card {
            padding: 35px;
        }
        .profile-info-card h3 {
            font-size: 20px;
            margin-bottom: 25px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 10px;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .info-row:last-child {
            border-bottom: none;
        }
        .info-row span {
            color: var(--text-muted);
            font-weight: 500;
        }
        .info-row strong {
            color: var(--text);
            font-size: 16px;
        }
        @media (max-width: 768px) {
            .profile-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🎟️ TicketTally</div>
        <nav class="side-nav" id="sidebarMenu">
            <!-- Loaded dynamically by sidebar.js -->
        </nav>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="topbar animate-fade-in">
            <div>
                <h1>User Profile</h1>
                <p>Manage your account details and settings</p>
            </div>
            
            <div class="user-pill">
                <span class="avatar" id="userInitial">U</span>
                <div class="info">
                    <strong id="userName">User</strong>
                    <small id="userRole">Role</small>
                </div>
            </div>
        </header>

        <section class="profile-container animate-fade-up">
            <div class="profile-grid">
                
                <!-- Avatar card -->
                <div class="glass-card profile-avatar-card">
                    <div class="large-avatar" id="profileInitial">U</div>
                    <h2 id="profileName">User Name</h2>
                    <p id="profileRoleBadge"><span class="status-badge online">Role</span></p>
                </div>

                <!-- Profile details -->
                <div class="glass-card profile-info-card">
                    <h3>Account Information</h3>
                    
                    <div class="info-row">
                        <span>Full Name</span>
                        <strong id="profileFullName">--</strong>
                    </div>
                    
                    <div class="info-row">
                        <span>Email Address</span>
                        <strong id="profileEmail">--</strong>
                    </div>
                    
                    <div class="info-row">
                        <span>Username</span>
                        <strong id="profileUsername">--</strong>
                    </div>
                    
                    <div class="info-row">
                        <span>User Role</span>
                        <strong id="profileRole">--</strong>
                    </div>

                    <div class="info-row">
                        <span>Account Status</span>
                        <strong id="profileStatus"><span class="status-badge online">Active</span></strong>
                    </div>
                </div>

            </div>
        </section>
    </main>
</div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/sidebar.js"></script>
<script src="js/profile.js"></script>
</body>
</html>
