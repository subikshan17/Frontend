<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Purchase Ticket | TicketTally</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="purchase.css">
</head>
<body>

<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🎟️ TicketTally</div>
        <nav class="side-nav" id="sidebarMenu">
            <!-- Loaded dynamically by sidebar.js -->
        </nav>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <div class="purchase-page animate-fade-in">
            <section class="purchase-header">
                <p class="eyebrow">Ticket Booking</p>
                <h1>Purchase Ticket</h1>
                <p>Select a ticket tier and confirm your booking.</p>
            </section>

            <!-- Event Card -->
            <section class="glass-card event-card">
                <p class="label">Selected Event</p>
                <h2 id="eventTitle">Loading event...</h2>
                <p id="eventVenue">Loading venue...</p>
                <div style="margin-top: 10px;"><span id="eventStatus" class="status-badge warning">...</span></div>
            </section>

            <!-- Success Box -->
            <section id="successBox" class="glass-card success-box hidden">
                <h2>🎉 Ticket Purchased Successfully</h2>
                <p><strong>Ticket ID / Serial:</strong> <span id="ticketSerial" style="letter-spacing: 1px; font-weight: 700; color: var(--primary);"></span></p>
                <p><strong>Event:</strong> <span id="ticketEvent"></span></p>
                <p><strong>Holder:</strong> <span id="ticketHolder"></span></p>
                <div style="margin-top: 15px;">
                    <a href="my-tickets.html" class="primary-btn">View My Tickets</a>
                </div>
            </section>

            <!-- Purchase Selection Card -->
            <section class="glass-card purchase-card" id="selectionCard">
                <h2>Choose Ticket Tier</h2>

                <div id="tiersContainer" class="tiers-container">
                    <!-- Dynamic tiers -->
                </div>

                <div id="selectedBox" class="selected-box hidden">
                    <h3>Selected Ticket</h3>
                    <p><strong>Tier:</strong> <span id="selectedTierName"></span></p>
                    <p><strong>Price:</strong> ₹<span id="selectedTierPrice"></span></p>
                </div>

                <button id="purchaseBtn" class="primary-btn purchase-btn" disabled>
                    Confirm Booking
                </button>
            </section>
        </div>
    </main>
</div>

<script src="config.js"></script>
<script src="api.js"></script>
<script src="auth.js"></script>
<script src="sidebar.js"></script>
<script src="purchase.js"></script>

</body>
</html>
