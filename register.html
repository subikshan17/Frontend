<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register | TicketTally</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="css/common.css">
    <link rel="stylesheet" href="css/register.css">
</head>
<body>

<section class="register-page">

    <div class="register-left">
        <div class="brand">🎟️ TicketTally</div>

        <h1>Create your account</h1>
        <p>
            Join TicketTally to manage events, purchase tickets,
            and access smart ticketing features.
        </p>

        <div class="features">
            <div>✅ Secure JWT Authentication</div>
            <div>✅ Role Based Access</div>
            <div>✅ Modern Ticket Management</div>
        </div>
    </div>

    <div class="register-right">
        <div class="glass-card register-card">
            <h2>Register</h2>
            <p class="subtitle">Enter your details to continue</p>

            <form id="registerForm">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="fullName" placeholder="Enter full name" required>
                </div>

                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Enter email" required>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" placeholder="Enter password" required>
                </div>

                <div class="form-group">
                    <label>Confirm Password</label>
                    <input type="password" id="confirmPassword" placeholder="Confirm password" required>
                </div>

                <div class="form-group">
                    <label>Role</label>
                    <select id="role" required>
                        <option value="">Select role</option>
                        <option value="TICKET_HOLDER">Ticket Holder</option>
                        <option value="EVENT_ORGANIZER">Event Organizer</option>
                        <option value="GATE_CONTROLLER">Gate Controller</option>
                    </select>
                </div>

                <p id="message" class="message"></p>

                <button type="submit" id="registerBtn" class="primary-btn">
                    Create Account
                </button>
            </form>

            <p class="login-link">
                Already have an account?
                <a href="login.html">Login</a>
            </p>
        </div>
    </div>

</section>

<script src="js/config.js"></script>
<script src="js/api.js"></script>
<script src="js/register.js"></script>
</body>
</html>
