<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events | TicketTally</title>
    <link rel="stylesheet" href="common.css">
    <link rel="stylesheet" href="sidebar.css">
    <link rel="stylesheet" href="events.css">
</head>
<body>

<div class="dashboard-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="brand">🎟️ TicketTally</div>
        <nav class="side-nav" id="sidebarMenu">
            <!-- Loaded dynamically by sidebar.js -->
        </nav>
        <button class="logout-btn" id="logoutBtn">🚪 Logout</button>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header class="page-header topbar animate-fade-in">
            <div>
                <h1>Events Catalog</h1>
                <p>Browse and manage all available events.</p>
            </div>

            <button id="createEventBtn" class="primary-btn">
                + Create Event
            </button>
        </header>

        <section id="eventsContainer" class="events-grid animate-fade-up">
            <p class="loading">Loading events catalog...</p>
        </section>
    </main>
</div>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="api.js"></script>
<script src="sidebar.js"></script>
<script src="events.js"></script>

</body>
</html>
